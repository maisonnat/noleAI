[workspace]
members = [
    "nole-core",
    "the-crab-engram",
    "notebooklm-rust-mcp",
    "nole-hud/src-tauri"
]
resolver = "2"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
