<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoleAI HUD</title>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #d4d4d4; margin: 0; padding: 15px; }
        .task-box { background: #252526; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        button { background: #0e639c; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1177bb; }
    </style>
</head>
<body>
    <div class="task-box">
        <h3>Tarea Actual</h3>
        <p id="current-task">Cargando plan...</p>
    </div>
    
    <button id="start-btn">Iniciar Sesión (25m)</button>
</body>
</html>
