<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoleAI HUD</title>
        <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #d4d4d4; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; justify-content: center; box-sizing: border-box; }
        .task-box { background: #252526; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        h3 { margin: 0 0 10px 0; color: #9cdcfe; font-size: 14px; }
        p { margin: 0; font-size: 16px; font-weight: bold;}
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { background: #0e639c; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; flex: 1; font-size: 14px; }
        button:hover { background: #1177bb; }
        button.stop { background: #a31515; }
        button.emergency { background: #5a1e1e; font-size: 12px; }
        .status-bar { display: flex; justify-content: space-between; font-size: 10px; margin-top: 10px; color: #606060; }
        
        /* Quiz UI styles */
        .quiz-container { display: none; background: #2d2d2d; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .quiz-container.active { display: block; }
        .question { font-size: 14px; margin-bottom: 10px; }
        .options { display: flex; flex-direction: column; gap: 8px; }
        .option { background: #3c3c3c; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .option:hover { background: #4c4c4c; }
        .option.selected { background: #0e639c; }
        .quiz-feedback { font-size: 12px; margin-top: 10px; min-height: 20px; }
        .correct { color: #4ec9b0; }
        .incorrect { color: #f48771; }
        </style>
</head>
<body>
    <div class="task-box">
        <h3>FOCO ACTUAL</h3>
        <p id="current-task">Cargando plan...</p>
    </div>
    
    <div class="btn-group">
        <button id="start-btn" onclick="toggleSession()">Iniciar Sesión</button>
    </div>

    <!-- Hito 4: Botón para probar tema con NotebookLM -->
    <div class="btn-group">
        <input type="text" id="topic-input" placeholder="Tema a probar..." style="flex: 1; padding: 8px; margin-right: 5px; border: none; border-radius: 4px; background: #3c3c3c; color: #d4d4d4;">
        <button onclick="testTopic()">Test</button>
    </div>

    <!-- Hito 4: Quiz UI Container -->
    <div id="quiz-container" class="quiz-container">
        <div class="question" id="question-text"></div>
        <div class="options" id="options-container"></div>
        <div class="quiz-feedback" id="quiz-feedback"></div>
    </div>

    <!-- Hito 5: Botón de emergencia TDAH -->
    <button class="emergency" onclick="activateOverload()">🚨 No Puedo (Simplificar)</button>

    <div class="status-bar">
        <span>core: v0.1.0</span>
        <span id="status-msg">listo</span>
    </div>

    <script>
        const { invoke } = window.__TAURI__.tauri;

        window.addEventListener("DOMContentLoaded", () => {
            invoke("get_daily_task").then((task) => {
                document.getElementById("current-task").textContent = task;
            });
        });

        async function toggleSession() {
            const btn = document.getElementById("start-btn");
            const result = await invoke("start_session");
            
            if (result.includes("iniciada")) {
                btn.textContent = "En Sesión (25m)";
                btn.classList.add("stop");
                document.getElementById("status-msg").textContent = "en progreso";
            }
        }

        async function activateOverload() {
            const result = await invoke("trigger_overload_mode");
            document.getElementById("current-task").textContent = "Respira. Solo enfócate en lo más básico.";
            document.getElementById("start-btn").style.display = 'none'; // Ocultar complejidad
            document.getElementById("status-msg").textContent = "modo sobrecarga";
        }

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        
        async function testTopic() {
            const topic = document.getElementById("topic-input").value;
            if (!topic) return;
            
            try {
                const questions = await invoke("test_topic", { topic });
                currentQuestions = questions;
                currentQuestionIndex = 0;
                showQuiz();
            } catch (error) {
                alert(`Error: ${error}`);
            }
        }
        
        function showQuiz() {
            if (currentQuestions.length === 0 || currentQuestionIndex >= currentQuestions.length) {
                document.getElementById("quiz-container").classList.remove("active");
                return;
            }
            
            const container = document.getElementById("quiz-container");
            container.classList.add("active");
            
            const questionText = currentQuestions[currentQuestionIndex];
            document.getElementById("question-text").textContent = `Pregunta ${currentQuestionIndex + 1}/${currentQuestions.length}: ${questionText}`;
            
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";
            
            const options = ["Verdadero", "Falso"];
            options.forEach((option, index) => {
                const optionDiv = document.createElement("div");
                optionDiv.className = "option";
                optionDiv.textContent = option;
                optionDiv.onclick = () => selectOption(index, option === "Verdadero");
                optionsContainer.appendChild(optionDiv);
            });
            
            document.getElementById("quiz-feedback").textContent = "";
        }
        
        function selectOption(index, isCorrect) {
            const options = document.querySelectorAll(".option");
            options.forEach(opt => opt.classList.remove("selected"));
            options[index].classList.add("selected");
            
            const feedback = document.getElementById("quiz-feedback");
            
            if (isCorrect) {
                feedback.textContent = "✓ Correcto";
                feedback.className = "quiz-feedback correct";
            } else {
                feedback.textContent = "✗ Incorrecto";
                feedback.className = "quiz-feedback incorrect";
            }
            
            setTimeout(() => {
                currentQuestionIndex++;
                showQuiz();
            }, 1500);
        }
    </script>
</body>
</html>
